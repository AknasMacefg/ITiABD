<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Reaction Rush{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'game/css/style.css' %}">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <a class="brand" href="{% url 'game:home' %}">Reaction Rush</a>
            <nav class="nav-links">
                <a href="{% url 'game:leaderboard' %}">Таблица лидеров</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'game:play' %}">Играть</a>
                    <a href="{% url 'game:logout' %}">Выйти</a>
                {% else %}
                    <a href="{% url 'game:login' %}">Вход</a>
                    <a href="{% url 'game:register' %}">Регистрация</a>
                {% endif %}
            </nav>
        </header>

        {% if messages %}
            <section class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </section>
        {% endif %}

        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
